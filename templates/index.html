<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORHAN AI | BYMEL Dashboard</title>
    <style>
        /* GENEL TASARIM */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #0d1117; 
            color: #c9d1d9; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex; 
            flex-direction: column; 
            height: 100vh;
        }

        /* ÜST BAŞLIK */
        header { 
            text-align: center; 
            padding: 20px 10px; 
            background: #161b22;
            border-bottom: 2px solid #238636;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        header h1 { 
            color: #2ea043; 
            font-size: 3rem; 
            font-weight: 800;
            text-shadow: 0 0 15px rgba(35, 134, 54, 0.5);
        }

        /* KONTROL PANELİ */
        .controls {
            background: #161b22;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #30363d;
        }
        select {
            background: #0d1117;
            color: #2ea043;
            border: 1px solid #238636;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: bold;
            outline: none;
        }

        /* MESAJ ALANI */
        #chat-window { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px;
            background: #0d1117;
        }
        .msg { 
            padding: 12px 16px; 
            border-radius: 15px; 
            max-width: 80%; 
            line-height: 1.5; 
            word-wrap: break-word;
        }
        .user { align-self: flex-end; background: #238636; color: white; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: #1c2128; border: 1px solid #30363d; border-bottom-left-radius: 2px; }

        /* GİRİŞ ALANI */
        .input-bar { 
            padding: 20px; 
            background: #161b22; 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid #30363d;
        }
        input { 
            flex: 1; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #30363d; 
            background: #0d1117; 
            color: white; 
            font-size: 1rem;
            outline: none;
        }
        button { 
            background: #238636; 
            color: white; 
            border: none; 
            padding: 0 20px; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer;
        }

        /* FOOTER */
        footer { 
            text-align: center; 
            padding: 10px; 
            font-size: 0.8rem; 
            background: #0d1117; 
            color: #8b949e; 
            border-top: 1px solid #21262d;
        }

        /* --- MOBİL UYUMLULUK --- */
        @media (max-width: 768px) {
            header h1 { font-size: 1.8rem; }
            .controls { flex-direction: column; }
            select { width: 100%; }
            .msg { max-width: 95%; font-size: 0.95rem; }
            input { font-size: 16px; } /* Mobil zoom engelleme */
        }
    </style>
</head>
<body>

<header>
    <h1>ORHAN AI</h1>
</header>

<div class="controls">
    <label>Sürüm:</label>
    <select id="versionSelect">
        <option value="v1">Orhan v1 (Hızlı)</option>
        <option value="v6">Orhan v6 (Zeki)</option>
    </select>
</div>

<div id="chat-window">
    <div class="msg bot">Merhaba Melih, sistemler aktif. BYMEL Dashboard'a hoş geldin.</div>
</div>

<div class="input-bar">
    <input type="text" id="userInput" placeholder="Mesajınızı yazın..." onkeypress="if(event.key=='Enter') sendMessage()">
    <button onclick="sendMessage()">GÖNDER</button>
</div>

<footer>
    © {{ yil }} <b>BYMEL AI</b> - Tüm Hakları Saklıdır.
</footer>

<script>
    async function sendMessage() {
        const input = document.getElementById("userInput");
        const chatWindow = document.getElementById("chat-window");
        const version = document.getElementById("versionSelect").value;
        
        if (!input.value.trim()) return;

        const text = input.value;
        chatWindow.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = "";
        chatWindow.scrollTop = chatWindow.scrollHeight;

        const loadingId = "load-" + Date.now();
        chatWindow.innerHTML += `<div class="msg bot" id="${loadingId}">Orhan düşünüyor...</div>`;
        chatWindow.scrollTop = chatWindow.scrollHeight;

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: text, version: version})
            });
            const data = await response.json();
            document.getElementById(loadingId).innerText = data.response;
        } catch (e) {
            document.getElementById(loadingId).innerText = "Hata oluştu!";
        }
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }
</script>

</body>
</html>
